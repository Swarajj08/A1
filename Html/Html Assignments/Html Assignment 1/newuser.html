<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New User</title>
</head>
<body>
    <h2>New User</h2>
    <form>
        
        <label for="firstname">First Name =</label>
        <input type="text" id="firstname" placeholder="Enter Name"><br><br>
        <label for="lastname">Last Name =</label>
        <input type="text" id="lastname" placeholder="Enter Last Name"><br><br>
        <label for="username">User Name =</label>
        <input type="text" id="username" placeholder="Enter User Name"><br><br>
        <label for="gender">Gender =</label>
        <label for="male">Male</label>
         <input type="radio" id="male">
        <label for="female">Female</label>
        <input type="radio" id="female"><br><br>
        <label for="knownlanguages">Known Languages =</label>
        <label for="marathi">Marathi</label>
        <input type="checkbox" id="marathi">
        <label for="hindi">Hindi</label>
        <input type="checkbox" id="hindi">
        <label for="english">English</label>
        <input type="checkbox" id="english"><br><br>
        <label for="email">E-mail =</label>
        <input type="email" name="email" id="email" placeholder="Enter e-mail"><br><br>
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter Password"><br><br>
         <label for="Re-enter">Re-Enter Password</label>
        <input type="password" id="Re-enter" placeholder="confirm Password"><br><br>
        <button>Submit</button>
      
    </form>
</body>
</html>

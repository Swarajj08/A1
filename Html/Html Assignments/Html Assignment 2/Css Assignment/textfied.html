<!DOCTYPE html>

    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Array Add and Display</title>
</head>
<body>

<h2>Array Example</h2>

<input type="text" id="textInput" placeholder="Enter value">
<button onclick="addData()">Add</button>
<button onclick="displayData()">Display</button>

<ul id="list"></ul>

<script>
    let arr = [];

    function addData() {
        let value = document.getElementById("textInput").value;
        
        if (value !== "") {
            arr.push(value);
            document.getElementById("textInput").value = "";
            alert("Added to array");
        } else {
            alert("Please enter something");
        }
    }

    function displayData() {
        let ul = document.getElementById("list");
        ul.innerHTML = "";

        for (let i = 0; i < arr.length; i++) {
            let li = document.createElement("li");
            li.textContent = arr[i];
            ul.appendChild(li);
        }
    }
</script>

</body>
</html>
</body>
</html>

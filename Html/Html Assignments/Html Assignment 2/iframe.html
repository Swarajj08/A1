<!-- 3) with help of iframe tag add you tube video 
   in web page 
 use video and audio controls from HTML5  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Tag</title>
</head>
<body>
    <h2>Youtube Video</h2>
    <iframe src="https://youtu.be/1vub1Fd1k-s?si=u4qzbMPqORJ1lDzv" frameborder="0"></iframe>
    <h2>HTML5 Video</h2>
<video width="480" controls>
    <source src="sample-video.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

<h2>HTML5 Audio</h2>
<audio controls>
    <source src="sample-audio.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

</body>
</html>

<!-- 3) in Day1 assignment add iframe tag inside index.html 
and open the hyperlink in iframe  -->
<!DOCTYPE html>
<html>
<head>
<title>Iframe Example</title>

<style>
body{
    margin-left: 80px;
    margin-right: 80px;
    font-family: Arial;
}

.input-container{
    display: flex;
    gap: 20px;
}

input[type="text"]{
    border: 3px solid blue;
    padding: 8px;
    width: 200px;
}

img{
    margin-top: 40px;
    border: 4px solid red;
    border-radius: 20px;
    width: 300px;
}

iframe{
    margin-top: 40px;
    width: 100%;
    height: 400px;
    border: 2px solid black;
}
</style>

</head>

<body>

<!-- Text Fields -->
<div class="input-container">
    <input type="text" placeholder="First Name">
    <input type="text" placeholder="Middle Name">
    <input type="text" placeholder="Last Name">
</div>

<!-- Image -->
<img src="Maharj.jpg" alt="Sample Image">

<br><br>

<!-- Hyperlinks -->
<a href="https://www.wikipedia.org" target="myframe">Open Wikipedia</a> |
<a href="https://www.example.com" target="myframe">Open Example</a>

<!-- Iframe -->
<iframe name="myframe"></iframe>

</body>
</html>

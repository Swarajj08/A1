<!DOCTYPE html>
<html>
<head>
<title>Table using JS</title>



<script>
function printTable(num) {
    for (let i = 1; i <= 10; i++) {
        console.log(num + " x " + i + " = " + (num * i));
    }
}

let number = 5;   // numeric variable
printTable(number);
</script>

</head>

<body>

<h2>Table is displayed on console of JS</h2>

</body>
</html>

 <!-- 2. Write an HTML using internal CSS that has 3 Text Input Fields
All should shown in one line
Set the left and right margins to appropriate space
Set the border to solid blue
Set border size properly
Below this show an image , show a rounded border in red color to image

Adjust the top margin of image to have proper distance from texfields -->
<!DOCTYPE html>
<html>
<head>
<title>Text Fields and Image</title>

<style>
body{
    margin-left: 110px;
    margin-right: 120px;
    font-family: Arial, sans-serif;
}

/* Container for text fields */
.input-container{
    display: flex;
    gap: 60px;
}

/* Styling text inputs */
input[type="text"]{
    border: 3px solid blue;
    padding: 11px;
    width: 300px;
    font-size: 16px;
}

/* Image styling */
img{
    margin-top: 20px;
    border: 4px solid red;
    border-radius: 20px;
    width: 300px;
}
</style>

</head>

<body>
<pre>
<div class="input-container">
    <input type="text" placeholder="First Name"><br>
    <input type="text" placeholder="Middle Name">
    <input type="text" placeholder="Last Name">
    
</div>
</pre>


<img src="Maharj.jpg" alt="Sample Image">

</body>
</html>
